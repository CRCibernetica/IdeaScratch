<!DOCTYPE html>
<html>
<head>
    <title>IdeaBoard Blockly IDE</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/python_compressed"></script>
    <style>
        body { font-family: sans-serif; }
        #blocklyDiv { height: 480px; width: 100%; border: 1px solid #ccc; }
        .controls { margin: 10px 0; display: flex; gap: 10px; }
        #codePreview { background: #eee; padding: 10px; white-space: pre; font-family: monospace; }
    </style>
</head>
<body>

    <h2>IdeaBoard Block Coder</h2>
    
    <div class="controls">
        <button onclick="connectSerial()" id="connectBtn">1. Connect Board</button>
        <button onclick="runCode()" id="runBtn" disabled>2. Flash to Board</button>
    </div>

    <div id="blocklyDiv"></div>
    
    <h3>Generated CircuitPython:</h3>
    <div id="codePreview"># Your code will appear here...</div>

    <xml id="toolbox" style="display: none">
        <block type="ib_pixel"></block>
        <block type="time_sleep"></block>
    </xml>

    <script>
        // 1. Define the Custom IdeaBoard Block
        Blockly.Blocks['ib_pixel'] = {
            init: function() {
                this.appendDummyInput()
                    .appendField("Set IdeaBoard Pixel")
                    .appendField(new Blockly.FieldColour("#0000ff"), "COLOUR");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour(230);
            }
        };

        Blockly.Blocks['time_sleep'] = {
            init: function() {
                this.appendDummyInput()
                    .appendField("Wait")
                    .appendField(new Blockly.FieldNumber(1), "SECONDS")
                    .appendField("seconds");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour(160);
            }
        };

        // 2. Define the Python Generator for these blocks
        Blockly.Python['ib_pixel'] = function(block) {
            var colour = block.getFieldValue('COLOUR');
            // Convert hex to (R, G, B)
            var r = parseInt(colour.substring(1, 3), 16);
            var g = parseInt(colour.substring(3, 5), 16);
            var b = parseInt(colour.substring(5, 7), 16);
            return `ib.pixel = (${r}, ${g}, ${b})\n`;
        };

        Blockly.Python['time_sleep'] = function(block) {
            var seconds = block.getFieldValue('SECONDS');
            return `sleep(${seconds})\n`;
        };

        // 3. Initialize Blockly
        const workspace = Blockly.inject('blocklyDiv', {
            toolbox: document.getElementById('toolbox')
        });

        // Update preview real-time
        workspace.addChangeListener(() => {
            const code = Blockly.Python.workspaceToCode(workspace);
            const fullCode = `import board\nfrom ideaboard import IdeaBoard\nfrom time import sleep\n\nib = IdeaBoard()\n\nwhile True:\n${Blockly.Python.prefixLines(code, '    ')}`;
            document.getElementById('codePreview').innerText = fullCode;
        });

        // 4. Web Serial Logic (The "Thonny" Part)
        let port;
        let writer;

        async function connectSerial() {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                writer = port.writable.getWriter();
                document.getElementById('runBtn').disabled = false;
                document.getElementById('connectBtn').innerText = "Connected!";
            } catch (err) {
                console.error("Connection failed", err);
            }
        }

        async function runCode() {
            const code = document.getElementById('codePreview').innerText;
            const encoder = new TextEncoder();

            // The Raw REPL Protocol sequence
            await writer.write(encoder.encode('\x03')); // Ctrl+C (Interrupt)
            await new Promise(r => setTimeout(r, 500));
            await writer.write(encoder.encode('\x01')); // Ctrl+A (Raw REPL)
            
            // Send the command to write the file
            const fileCommand = `f = open('code.py', 'w')\nf.write('''${code}''')\nf.close()\n`;
            await writer.write(encoder.encode(fileCommand));
            
            await writer.write(encoder.encode('\x04')); // Ctrl+D (Soft Reboot)
            alert("Code flashed to IdeaBoard!");
        }
    </script>
</body>
</html>
