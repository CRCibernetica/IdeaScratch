<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IdeaScratch v1.42</title>

    <script src="https://cdn.jsdelivr.net/npm/blockly/blockly.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/blockly/python_compressed.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/blockly/javascript_compressed.js"></script>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <h2>IdeaScratch v1.42</h2>

    <div id="app-layout">

        <div class="sim-sidebar" id="simSidebar">
            <div class="sim-inner">
                <div class="sim-controls">
                    <button class="sim-btn" onclick="runSimulator()">▶ Play Sim</button>
                    <button class="sim-btn" id="stopSimBtn" onclick="stopSimulator()"><span style="font-size:1.4em;line-height:1;vertical-align:middle">■</span> Stop</button>
                </div>
                <div class="board-container">
                    <img src="ideaboard.svg" alt="IdeaBoard" class="board-img">
                    <div id="sim-pixel"></div>
                    <div id="sim-boot-hitbox" title="BOOT Button"></div>
                </div>
            </div>
        </div>

        <div class="ide-panel">
            <div class="hardware-controls">
                <button class="hw-btn" onclick="toggleSidebar()" id="toggleSidebarBtn">◀ Hide Simulator</button>

                <div class="dropdown-wrapper">
                    <button class="hw-btn" onclick="toggleDropdown('examplesMenu')">Examples ▾</button>
                    <div class="dropdown-menu" id="examplesMenu">
                        <div class="dropdown-item" onclick="loadExample('buttonLED')">Button &amp; LED</div>
                        <div class="dropdown-item" onclick="loadExample('blink')">Blink</div>
                        <div class="dropdown-item" onclick="loadExample('motorForward')">Motor Forward</div>
                    </div>
                </div>

                <div class="dropdown-wrapper">
                    <button class="hw-btn" onclick="toggleDropdown('projectsMenu')">My Projects ▾</button>
                    <div class="dropdown-menu" id="projectsMenu"></div>
                </div>

                <button class="hw-btn" onclick="toggleConnection()" id="connectBtn">Connect</button>
                <button class="hw-btn" onclick="runCode()" id="runBtn" disabled>Run</button>
                <button class="hw-btn" onclick="stopCode()" id="stopBtn" disabled>Stop</button>
                <span id="statusLabel" class="status">Status: Disconnected</span>
            </div>

            <div id="blocklyDiv"></div>

            <details class="code-container" id="pythonDetails">
                <summary>Generated CircuitPython (code.py) ▾</summary>
                <div id="codePreview"># Code will appear here...</div>
            </details>

            <details class="code-container" open id="consoleDetails">
                <summary>Output Console ▾</summary>
                <div id="simConsole"></div>
                <button onclick="document.getElementById('simConsole').innerHTML=''" style="margin-top:10px; background:#6c757d; color:white; border:none; padding:8px 12px; border-radius:4px; cursor:pointer; font-weight:bold;">Clear Console</button>
            </details>
        </div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="IdeaBoard" colour="230">
            <block type="ib_pixel"></block>
            <block type="ib_motors"></block>
        </category>
        <category name="Events" colour="65">
            <block type="ib_event_handler"></block>
            <block type="ib_event_state"></block>
        </category>
        <category name="Logic" colour="210">
            <block type="controls_if"></block>
        </category>
        <category name="Control" colour="120">
            <block type="controls_forever"></block>
            <block type="time_sleep"></block>
        </category>
        <category name="Text" colour="160">
            <block type="text_print"></block>
            <block type="text"></block>
        </category>
    </xml>

    <script src="js/blocks.js"></script>
    <script src="js/generators.js"></script>
    <script src="js/simulator.js"></script>
    <script src="js/serial.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/workspace.js"></script>

</body>
</html>
