<!DOCTYPE html>
<html>
<head>
    <title>IdeaBoard Blockly IDE</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/python_compressed"></script>
    
    <script src="https://unpkg.com/@blockly/field-colour"></script>

    <style>
        body { font-family: sans-serif; margin: 20px; background: #f4f4f9; }
        #blocklyDiv { height: 500px; width: 100%; border: 1px solid #ddd; background: white; }
        .controls { margin-bottom: 15px; display: flex; gap: 10px; }
        button { padding: 10px 20px; border-radius: 5px; border: none; background: #007bff; color: white; cursor: pointer;}
        #codePreview { background: #282c34; color: #abb2bf; padding: 15px; border-radius: 8px; white-space: pre; font-family: monospace; margin-top: 15px; }
    </style>
</head>
<body>

    <h2>IdeaBoard Scratch Prototype</h2>
    
    <div class="controls">
        <button onclick="connectSerial()">1. Connect Board</button>
        <button onclick="runCode()" id="runBtn" disabled>2. Flash to Board</button>
    </div>

    <div id="blocklyDiv"></div>
    <div id="codePreview"># Code will appear here...</div>

    <xml id="toolbox" style="display: none">
        <block type="ib_pixel"></block>
        <block type="time_sleep"></block>
    </xml>

    <script>
        // --- 1. BLOCK DEFINITIONS ---
        Blockly.common.defineBlocksWithJsonArray([
            {
                "type": "ib_pixel",
                "message0": "Set IdeaBoard Pixel %1",
                "args0": [
                    {
                        "type": "field_colour",
                        "name": "COLOUR",
                        "colour": "#0000ff"
                    }
                ],
                "previousStatement": null,
                "nextStatement": null,
                "colour": 230
            },
            {
                "type": "time_sleep",
                "message0": "Wait %1 seconds",
                "args0": [
                    {
                        "type": "field_number",
                        "name": "SECONDS",
                        "value": 1
                    }
                ],
                "previousStatement": null,
                "nextStatement": null,
                "colour": 160
            }
        ]);

        // --- 2. GENERATOR LOGIC (Modern Syntax) ---
        // We use the new 'forBlock' mapping to ensure the Python generator sees them
        python.pythonGenerator.forBlock['ib_pixel'] = function(block) {
            const colour = block.getFieldValue('COLOUR');
            const r = parseInt(colour.substring(1, 3), 16);
            const g = parseInt(colour.substring(3, 5), 16);
            const b = parseInt(colour.substring(5, 7), 16);
            return `ib.pixel = (${r}, ${g}, ${b})\n`;
        };

        python.pythonGenerator.forBlock['time_sleep'] = function(block) {
            const seconds = block.getFieldValue('SECONDS');
            return `sleep(${seconds})\n`;
        };

        // --- 3. WORKSPACE SETUP ---
        const workspace = Blockly.inject('blocklyDiv', {
            toolbox: document.getElementById('toolbox')
        });

        workspace.addChangeListener(() => {
            // Updated call for modern Blockly Python generator
            const code = python.pythonGenerator.workspaceToCode(workspace);
            const fullCode = `import board\nfrom ideaboard import IdeaBoard\nfrom time import sleep\n\nib = IdeaBoard()\n\nwhile True:\n${python.pythonGenerator.prefixLines(code, '    ')}`;
            document.getElementById('codePreview').innerText = fullCode;
        });

        // --- 4. SERIAL LOGIC ---
        let boardPort, boardWriter;

        async function connectSerial() {
            boardPort = await navigator.serial.requestPort();
            await boardPort.open({ baudRate: 115200 });
            boardWriter = boardPort.writable.getWriter();
            document.getElementById('runBtn').disabled = false;
        }

        async function runCode() {
            const code = document.getElementById('codePreview').innerText;
            const encoder = new TextEncoder();
            
            // Handshake
            await boardWriter.write(encoder.encode('\x03')); 
            await new Promise(r => setTimeout(r, 500));
            await boardWriter.write(encoder.encode('\x01')); 
            
            // Transfer
            const script = `f=open('code.py','w');f.write('''${code}''');f.close()\n`;
            await boardWriter.write(encoder.encode(script));
            
            // Reboot
            await boardWriter.write(encoder.encode('\x04')); 
            alert("Sent!");
        }
    </script>
</body>
</html>
