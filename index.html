<!DOCTYPE html>
<html>
<head>
    <title>IdeaBoard Blockly IDE</title>
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script src="https://unpkg.com/blockly/python_compressed"></script>
    
    <script src="https://unpkg.com/@blockly/field-colour"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background: #f4f4f9; }
        #blocklyDiv { height: 500px; width: 100%; border: 1px solid #ddd; border-radius: 8px; background: white; }
        .controls { margin-bottom: 15px; display: flex; gap: 10px; align-items: center; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; background: #007bff; color: white; font-weight: bold; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        #codePreview { background: #282c34; color: #abb2bf; padding: 15px; border-radius: 8px; white-space: pre; font-family: 'Consolas', monospace; margin-top: 15px; overflow-x: auto; }
        .status { font-size: 0.9em; color: #666; }
    </style>
</head>
<body>

    <h2>IdeaBoard Scratch</h2>
    
    <div class="controls">
        <button onclick="connectSerial()" id="connectBtn">1. Connect Board</button>
        <button onclick="runCode()" id="runBtn" disabled>2. Flash to IdeaBoard</button>
        <span id="statusLabel" class="status">Status: Disconnected</span>
    </div>

    <div id="blocklyDiv"></div>
    
    <h3>Python Output (code.py)</h3>
    <div id="codePreview"># Blocks will be converted here...</div>

    <xml id="toolbox" style="display: none">
        <category name="IdeaBoard" colour="230">
            <block type="ib_pixel"></block>
        </category>
        <category name="Control" colour="160">
            <block type="time_sleep"></block>
        </category>
    </xml>

    <script>
        // --- GLOBAL STATE ---
        let boardPort = null;
        let boardWriter = null;

        // --- 1. DEFINE BLOCKS ---
        Blockly.Blocks['ib_pixel'] = {
            init: function() {
                this.appendDummyInput()
                    .appendField("Set IdeaBoard Pixel")
                    // Note the specific call to FieldColour
                    .appendField(new Blockly.FieldColour("#0000ff"), "COLOUR");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour(230);
            }
        };

        Blockly.Blocks['time_sleep'] = {
            init: function() {
                this.appendDummyInput()
                    .appendField("Wait")
                    .appendField(new Blockly.FieldNumber(1, 0), "SECONDS")
                    .appendField("seconds");
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour(160);
            }
        };

        // --- 2. PYTHON GENERATORS ---
        Blockly.Python['ib_pixel'] = function(block) {
            var colour = block.getFieldValue('COLOUR');
            var r = parseInt(colour.substring(1, 3), 16);
            var g = parseInt(colour.substring(3, 5), 16);
            var b = parseInt(colour.substring(5, 7), 16);
            return `ib.pixel = (${r}, ${g}, ${b})\n`;
        };

        Blockly.Python['time_sleep'] = function(block) {
            var seconds = block.getFieldValue('SECONDS');
            return `sleep(${seconds})\n`;
        };

        // --- 3. INITIALIZE BLOCKLY ---
        const workspace = Blockly.inject('blocklyDiv', {
            toolbox: document.getElementById('toolbox'),
            grid: {spacing: 20, length: 3, colour: '#ccc', snap: true}
        });

        workspace.addChangeListener(() => {
            const code = Blockly.Python.workspaceToCode(workspace);
            const fullCode = `import board\nfrom ideaboard import IdeaBoard\nfrom time import sleep\n\nib = IdeaBoard()\n\nwhile True:\n${Blockly.Python.prefixLines(code, '    ')}`;
            document.getElementById('codePreview').innerText = fullCode;
        });

        // --- 4. SERIAL COMMUNICATION ---
        async function connectSerial() {
            try {
                // Request port
                boardPort = await navigator.serial.requestPort();
                await boardPort.open({ baudRate: 115200 });
                
                // Set up writer
                boardWriter = boardPort.writable.getWriter();
                
                document.getElementById('runBtn').disabled = false;
                document.getElementById('connectBtn').innerText = "Connected";
                document.getElementById('statusLabel').innerText = "Status: Online (IdeaBoard)";
            } catch (err) {
                console.error("Connection failed", err);
                alert("Could not connect to Serial. Make sure you are using Chrome/Edge and no other app (like Thonny) is using the port.");
            }
        }

        async function runCode() {
            if (!boardWriter) return;

            const code = document.getElementById('codePreview').innerText;
            const encoder = new TextEncoder();

            try {
                // 1. Interrupt current execution
                await boardWriter.write(encoder.encode('\x03')); 
                await new Promise(r => setTimeout(r, 300));

                // 2. Enter Raw REPL
                await boardWriter.write(encoder.encode('\x01')); 
                await new Promise(r => setTimeout(r, 300));
                
                // 3. Command to write file
                // We use repr() style wrapping to handle multiline strings safely
                const transferScript = `f=open('code.py','w');f.write('''${code}''');f.close()\n`;
                await boardWriter.write(encoder.encode(transferScript));
                await new Promise(r => setTimeout(r, 500));
                
                // 4. Soft Reboot
                await boardWriter.write(encoder.encode('\x04')); 
                
                document.getElementById('statusLabel').innerText = "Status: Code Flashed!";
            } catch (err) {
                console.error("Flash failed", err);
                alert("Flash failed. Check console for details.");
            }
        }
    </script>
</body>
</html>
