<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CRCibernetica IdeaScratch v1.65</title>

    <script src="https://cdn.jsdelivr.net/npm/blockly/blockly.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/blockly/python_compressed.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/blockly/javascript_compressed.js"></script>

    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <h2>CRCibernetica IdeaScratch v1.65</h2>

    <div id="app-layout">

        <div class="sim-sidebar" id="simSidebar">
            <div class="sim-inner">
                <div class="sim-controls">
                    <button class="sim-btn" onclick="runSimulator()">▶ Play Sim</button>
                    <button class="sim-btn" id="stopSimBtn" onclick="stopSimulator()"><span style="font-size:1.4em;line-height:1;vertical-align:middle">■</span> Stop</button>
                </div>
                <div class="board-container">
                    <img src="ideaboard.svg" alt="IdeaBoard" class="board-img">
                    <div id="sim-pixel"></div>
                    <div id="sim-motor1-overlay" title="Motor 1"></div>
                    <div id="sim-motor2-overlay" title="Motor 2"></div>
                    <div id="sim-boot-hitbox" title="BOOT Button"></div>
                </div>
                <div id="sim-motors">
                    <div class="sim-motor-row">
                        <span class="sim-motor-label">Motor 1</span>
                        <div class="sim-motor-bar-wrap">
                            <div class="sim-motor-bar" id="sim-motor1-bar"></div>
                        </div>
                        <span class="sim-motor-value" id="sim-motor1-value">0</span>
                    </div>
                    <div class="sim-motor-row">
                        <span class="sim-motor-label">Motor 2</span>
                        <div class="sim-motor-bar-wrap">
                            <div class="sim-motor-bar" id="sim-motor2-bar"></div>
                        </div>
                        <span class="sim-motor-value" id="sim-motor2-value">0</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="ide-panel">
            <div class="hardware-controls">
                <button class="hw-btn" onclick="toggleSidebar()" id="toggleSidebarBtn">◀ Hide Simulator</button>

                <div class="dropdown-wrapper">
                    <button class="hw-btn" onclick="toggleDropdown('examplesMenu')">Examples ▾</button>
                    <div class="dropdown-menu" id="examplesMenu">
                        <div class="dropdown-item" onclick="loadExample('buttonLED')">Button &amp; LED</div>
                        <div class="dropdown-item" onclick="loadExample('blink')">Blink</div>
                        <div class="dropdown-item" onclick="loadExample('motorForward')">Motor Forward</div>
                    </div>
                </div>

                <div class="dropdown-wrapper">
                    <button class="hw-btn" onclick="toggleDropdown('projectsMenu')">My Projects ▾</button>
                    <div class="dropdown-menu" id="projectsMenu"></div>
                </div>

                <button class="hw-btn" onclick="toggleConnection()" id="connectBtn">Connect</button>
                <button class="hw-btn" onclick="runCode()" id="runBtn" disabled>Run</button>
                <button class="hw-btn" onclick="stopCode()" id="stopBtn" disabled>Stop</button>
                <span id="statusLabel" class="status">Status: Disconnected</span>
            </div>

            <div id="blocklyDiv"></div>

            <details class="code-container" id="pythonDetails">
                <summary>Generated CircuitPython (code.py) ▾</summary>
                <div id="codePreview"># Code will appear here...</div>
            </details>

            <details class="code-container" open id="consoleDetails">
                <summary>Output Console ▾</summary>
                <div id="simConsole"></div>
                <button onclick="document.getElementById('simConsole').innerHTML=''" style="margin-top:10px; background:#6c757d; color:white; border:none; padding:8px 12px; border-radius:4px; cursor:pointer; font-weight:bold;">Clear Console</button>
            </details>
        </div>
    </div>

    <xml id="toolbox" style="display: none">
        <category name="IdeaBoard" colour="230">
            <category name="Pixel" colour="230">
                <block type="ib_pixel"></block>
                <block type="ib_brightness"></block>
                <block type="ib_arcoiris"></block>
            </category>
            <category name="Motor" colour="230">
                <block type="ib_motors"></block>
            </category>
            <category name="Servo" colour="180">
                <block type="ib_servo_setup"></block>
                <block type="ib_servo_angle"></block>
            </category>
            <category name="Pins" colour="200">
                <block type="ib_digital_in_setup"></block>
                <block type="ib_digital_in_read"></block>
                <block type="ib_digital_out_setup"></block>
                <block type="ib_digital_out_write"></block>
                <block type="ib_analog_in_setup"></block>
                <block type="ib_analog_in_read"></block>
                <block type="ib_analog_out_setup"></block>
                <block type="ib_analog_out_write"></block>
                <block type="ib_map_range"></block>
            </category>
        </category>
        <category name="Events" colour="65">
            <block type="ib_event_handler"></block>
            <block type="ib_event_state"></block>
        </category>
        <category name="Variables" colour="330" custom="VARIABLE"></category>
        <category name="Functions" colour="290" custom="PROCEDURE"></category>
        <category name="Logic" colour="210">
            <block type="controls_if"></block>
            <block type="logic_compare"></block>
            <block type="logic_operation"></block>
            <block type="logic_negate"></block>
            <block type="logic_boolean"></block>
        </category>
        <category name="Control" colour="120">
            <block type="controls_on_start"></block>
            <block type="controls_forever"></block>
            <block type="time_sleep"></block>
            <block type="controls_repeat_ext">
                <value name="TIMES">
                    <shadow type="math_number"><field name="NUM">10</field></shadow>
                </value>
            </block>
            <block type="controls_whileUntil"></block>
            <block type="controls_for">
                <value name="FROM">
                    <shadow type="math_number"><field name="NUM">1</field></shadow>
                </value>
                <value name="TO">
                    <shadow type="math_number"><field name="NUM">10</field></shadow>
                </value>
                <value name="BY">
                    <shadow type="math_number"><field name="NUM">1</field></shadow>
                </value>
            </block>
        </category>
        <category name="Math" colour="230">
            <block type="math_number"></block>
            <block type="math_arithmetic">
                <value name="A"><shadow type="math_number"><field name="NUM">1</field></shadow></value>
                <value name="B"><shadow type="math_number"><field name="NUM">1</field></shadow></value>
            </block>
            <block type="math_single"></block>
            <block type="math_random_int">
                <value name="FROM"><shadow type="math_number"><field name="NUM">1</field></shadow></value>
                <value name="TO"><shadow type="math_number"><field name="NUM">100</field></shadow></value>
            </block>
        </category>
        <category name="Text" colour="160">
            <block type="text_print"></block>
            <block type="text"></block>
            <block type="text_join"></block>
            <block type="text_length"></block>
        </category>
    </xml>

    <script src="js/blocks.js"></script>
    <script src="js/generators.js"></script>
    <script src="js/simulator.js"></script>
    <script src="js/serial.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/workspace.js"></script>

</body>
</html>
